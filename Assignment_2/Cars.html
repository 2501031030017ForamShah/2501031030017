<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDrive - Our Collection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">EliteDrive</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#" class="active">Cars</a>
            <a href="#">Services</a>
            <a href="#">Trade-In</a>
            <a href="#">Testimonials</a>
            <a href="#">FAQ</a>
            <a href="#">Contact</a>
            <button class="btn-test-drive">Book Test Drive</button>
        </nav>
    </header>

    <main>
        <section class="intro">
            <h1>Our Collection</h1>
            <p>Browse our premium selection of vehicles</p>
        </section>

        <section class="filters">
            <div class="search-bar">
                <input type="text" placeholder="Search by name or brand...">
            </div>
            <div class="filter-chips">
                <button class="chip active">All</button>
                <button class="chip">Sports</button>
                <button class="chip">Luxury Sedan</button>
                <button class="chip">SUV</button>
                <button class="chip">Electric</button>
                <button class="chip">Convertible</button>
                <button class="chip">Sports Coupe</button>
            </div>
            <p class="results-count">Showing 6 vehicles</p>
        </section>

        <section class="car-grid">
            <!-- Car Card 1 -->
            <div class="car-card">
                <div class="badge">2024</div>
                <img src="red-car.jpg" alt="Red Sports Car">
            </div>
            <!-- Car Card 2 -->
            <div class="car-card">
                <div class="badge">2024</div>
                <img src="black-sedan.jpg" alt="Black Luxury Sedan">
            </div>
            <!-- Car Card 3 -->
            <div class="car-card">
                <div class="badge">2024</div>
                <img src="white-suv.jpg" alt="White SUV">
            </div>
        </section>
    </main>
</body>
</html>
